<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Used Car Listings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="site-page used-page">
  <header>
    <nav>
      <div class="navbar">
        <div class="logo">
          <h1>CarRec</h1>
        </div>
        <div class="nav-elements">
          <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="/#about">ABOUT</a></li>
            <li><a href="/used">USED CARS</a></li>
          </ul>
        </div>
        <div class="ICONS">
          <img class="dark-toggle" src="{{ url_for('static', filename='FontAwesome-Moon-icon.png') }}" alt="Toggle dark mode" role="button" tabindex="0">
        </div>
      </div>
    </nav>
  </header>

  <section class="recommend">
    <div class="box">
      <h1 class="text">Find the Right <span>Used Car</span> for You</h1>
      <div class="hp-used">
        <input type="text" id="usedQuery" placeholder="e.g. SUV under 15 lakhs in Hyderabad">
        <button class="search-btn" id="usedSearchButton" onclick="sendUsedQuery()">🔍</button>
      </div>      
      <div id="loading" style="display:none; font-size: 20px; text-align:center;">🔄 Loading results...</div>

      <div id="used-results" class="lists">
        <!-- Injected car cards go here -->
      </div>
    </div>
  </section>

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      document.body.classList.toggle("dark-mode", savedTheme === "dark");

      const toggle = document.querySelector(".dark-toggle");
      if (!toggle) return;

      function toggleTheme() {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
      }

      toggle.addEventListener("click", toggleTheme);
      toggle.addEventListener("keydown", function (event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleTheme();
        }
      });
    })();

    async function sendUsedQuery() {
      const userInput = document.getElementById("usedQuery").value;
      const resultBox = document.getElementById("used-results");
      const loadingBox = document.getElementById("loading");
      const searchButton = document.getElementById("usedSearchButton");
      const originalButtonText = "🔍";

      resultBox.innerHTML = "";
      loadingBox.textContent = "Searching CarTrade and OLX... This may take 20-40 seconds.";
      loadingBox.style.display = "block";
      searchButton.disabled = true;
      searchButton.textContent = "Searching...";

      try {
        const response = await fetch("/used-cars", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ query: userInput })
        });

        const data = await response.json();

        if (data.source_errors && data.source_errors.length > 0) {
          const warningBox = document.createElement("div");
          warningBox.classList.add("source-warning");
          warningBox.innerHTML = `
            <p><strong>Some sources could not be searched.</strong></p>
            <ul>
              ${data.source_errors.map(item => `
                <li>${item.source}: ${String(item.error).slice(0, 140)}</li>
              `).join("")}
            </ul>
          `;
          resultBox.appendChild(warningBox);
        }

        if (data.recommendations && data.recommendations.length > 0) {
          data.recommendations.forEach(car => {
            const item = document.createElement("div");
            item.classList.add("elements");
            const listingUrl = car.listing_url || "";
            let sourceName = car.source;

            if (!sourceName && listingUrl.includes("cartrade")) {
              sourceName = "CarTrade";
            } else if (!sourceName && listingUrl.includes("cars24")) {
              sourceName = "Cars24";
            } else if (!sourceName) {
              sourceName = "Source";
            }
            const imageUrl = car.image_url || "/static/pic.avif";

            item.innerHTML = `
              <img src="${imageUrl}" alt="${car.title}" loading="lazy" onerror="this.onerror=null; this.src='/static/pic.avif';">
              <div class="t">
                <h1>${car.title}</h1>
                <div class="p">
                  <p>${car.price || 'Price not listed'}</p>
                  <p>${car.km || 'KM unknown'} | ${car.fuel || ''} | ${car.transmission || ''}</p>
                  <p>${car.owner ? 'Owner: ' + car.owner : ''}</p>
                <p>${car.location}</p>
              </div>
              <div class="links">
                <a href="${listingUrl}" target="_blank">View on ${sourceName}</a>
              </div>
            </div>
          `;
            resultBox.appendChild(item);
          });
        } else {
          const noResults = document.createElement("p");
          noResults.textContent = "No used cars found right now. Try changing the budget, city, brand, or filters.";
          resultBox.appendChild(noResults);
        }
      } catch (error) {
        resultBox.innerHTML = `<p>Something went wrong while searching used cars. Please try again.</p>`;
      } finally {
        loadingBox.style.display = "none";
        searchButton.disabled = false;
        searchButton.textContent = originalButtonText;
      }
    }
  </script>
</body>
</html>
