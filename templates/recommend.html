<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="site-page recommend-page">
    <header>
        <nav>
            <div class="navbar">
                <div class="logo">
                    <h1>CarRec</h1>
                </div>
                <div class="nav-elements">
                    <ul>
                        <li><a href="/">HOME</a></li>
                        <li><a href="/#about">ABOUT</a></li>
                        <li><a href="/used">USED CARS</a></li>
                    </ul>
                </div>
                <div class="ICONS">
                    <img class="dark-toggle" src="{{ url_for('static', filename='FontAwesome-Moon-icon.png') }}" alt="Toggle dark mode" role="button" tabindex="0">
                </div>
            </div>
        </nav>
    </header>

    <section class="recommend chat-recommend">
        <div class="box chat-box">
            <h1 class="text">Recommend Cars According To Search</h1>

            <div id="chat-window" class="chat-window">
                <!-- Query and recommendation blocks will be injected here dynamically -->
            </div>

            <div class="search-again-box chat-input-box">
                <input
                    type="text"
                    id="recommendQuery"
                    placeholder="Ask another query, e.g. automatic SUV under 15 lakh"
                >
                <button type="button" onclick="searchAgain()">Search</button>
            </div>
        </div>
    </section>

   <script>
    (function () {
        const savedTheme = localStorage.getItem("theme");
        document.body.classList.toggle("dark-mode", savedTheme === "dark");

        const toggle = document.querySelector(".dark-toggle");
        if (!toggle) return;

        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
        }

        toggle.addEventListener("click", toggleTheme);
        toggle.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                toggleTheme();
            }
        });
    })();

    async function fetchRecommendations(query) {
        const chatWindow = document.getElementById("chat-window");
        const chatBlock = document.createElement("div");
        chatBlock.classList.add("chat-block");

        const userBubble = document.createElement("div");
        userBubble.classList.add("chat-bubble", "user-bubble");
        userBubble.textContent = query;

        const resultBox = document.createElement("div");
        resultBox.classList.add("lists", "chat-results");
        resultBox.innerHTML = "<p>Loading recommendations...</p>";

        chatBlock.appendChild(userBubble);
        chatBlock.appendChild(resultBox);
        chatWindow.appendChild(chatBlock);
        chatBlock.scrollIntoView({ behavior: "smooth", block: "start" });

        try {
            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();

            console.log("FULL BACKEND RESPONSE:", data);

            resultBox.innerHTML = "";

            if (!response.ok) {
                resultBox.innerHTML = `<p>Error: ${data.error || "Something went wrong."}</p>`;
                return;
            }

            if (data.message && (!data.recommendations || data.recommendations.length === 0)) {
                resultBox.innerHTML = `<p>${data.message}</p>`;
                return;
            }

            if (!data.recommendations || data.recommendations.length === 0) {
                resultBox.innerHTML = "<p>No recommendations found.</p>";
                return;
            }

            const recommendations = [
                ...new Map(data.recommendations.map(item => [item.Model, item])).values()
            ].slice(0, 4);

            recommendations.forEach(car => {
                const item = document.createElement("div");
                item.classList.add("elements");

                const price = car["Ex-Showroom_Price"]
                    ? Math.round(Number(car["Ex-Showroom_Price"])).toLocaleString("en-IN")
                    : "N/A";

                const mileage = car["ARAI_Certified_Mileage"]
                    ? Number(car["ARAI_Certified_Mileage"]).toFixed(1)
                    : "N/A";

                const reasons = car.match_reasons && car.match_reasons.length > 0
                    ? `<p><strong>Why:</strong> ${car.match_reasons.join(", ")}</p>`
                    : "";

                item.innerHTML = `
                    <img src="${car.carImage || "/static/car_images/pic1.avif"}" 
                         alt="${car.Make || "Car"} ${car.Model || ""}">

                    <div class="t">
                        <h1>${car.Make || "Unknown"} ${car.Model || ""} ${car.Variant || ""}</h1>

                        <div class="p">
                            <p>₹${price}</p>
                            <p>Mileage: ${mileage} kmpl</p>
                            <p>Transmission: ${car.Transmission || "Not specified"}</p>
                            <p>Fuel: ${car.Fuel_Type || "Not specified"}</p>
                            ${reasons}
                        </div>

                        <div class="links">
                            <a href="${car.carDekhoLink || "#"}" target="_blank">CarDekho</a>
                            <a href="${car.carWaleLink || "#"}" target="_blank">CarWale</a>
                        </div>
                    </div>
                `;

                resultBox.appendChild(item);
            });

        } catch (error) {
            console.error("FRONTEND ERROR:", error);
            resultBox.innerHTML = `
                <p>Frontend error:</p>
                <pre style="white-space: pre-wrap; color: red;">${error.message}</pre>
            `;
        }
    }

    function searchAgain() {
        const inputBox = document.getElementById("recommendQuery");
        const query = inputBox.value.trim();

        if (!query) {
            alert("Please enter a query.");
            return;
        }

        localStorage.setItem("userQuery", query);
        inputBox.value = "";
        fetchRecommendations(query);
    }

    window.onload = function () {
        const userQuery = localStorage.getItem("userQuery");

        if (!userQuery) {
            const chatWindow = document.getElementById("chat-window");
            const emptyState = document.createElement("div");
            emptyState.classList.add("chat-empty");
            emptyState.textContent = "No search query found. Please go back and search again.";
            chatWindow.appendChild(emptyState);
            return;
        }

        fetchRecommendations(userQuery);
    };
    document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        const activeElement = document.activeElement;

        if (activeElement && activeElement.id === "recommendQuery") {
            searchAgain();
        }
    }
});
</script>
</body>
</html>
