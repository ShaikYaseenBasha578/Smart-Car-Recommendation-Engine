<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="logo">
                    <h1>CarRec</h1>
                </div>
                <div class="nav-elements">
                    <ul>
                        <li><a href="./#home">HOME</a></li>
                        <li><a href="./#about">ABOUT</a></li>
                        <li><a href="">SELL</a></li>
                        <li><a href="./#contact">CONTACT US</a></li>
                    </ul>
                </div>
                <div class="ICONS">
                    <img src="{{ url_for('static', filename='FontAwesome-Moon-icon.png') }}">
                </div>
            </div>
        </nav>
    </header>

    <section class="recommend">
        <div class="box">
            <h1 class="text">Recommend Cars According To Search</h1>
            <div id="result-box" class="lists">
                <!-- Cards will be injected here dynamically -->
            </div>
        </div>
    </section>

   <script>
    window.onload = async function () {
        const userQuery = localStorage.getItem("userQuery");
        const resultBox = document.getElementById("result-box");

        console.log("USER QUERY:", userQuery);

        resultBox.innerHTML = "<p>Loading recommendations...</p>";

        if (!userQuery) {
            resultBox.innerHTML = "<p>No search query found. Please go back and search again.</p>";
            return;
        }

        try {
            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query: userQuery })
            });

            const data = await response.json();

            console.log("FULL BACKEND RESPONSE:", data);
            console.log("RECOMMENDATIONS:", data.recommendations);

            resultBox.innerHTML = "";

            if (!response.ok) {
                resultBox.innerHTML = `<p>Error: ${data.error || "Something went wrong."}</p>`;
                return;
            }

            if (data.message) {
                resultBox.innerHTML = `<p>${data.message}</p>`;
                return;
            }

            if (!data.recommendations || data.recommendations.length === 0) {
                resultBox.innerHTML = "<p>No recommendations found.</p>";
                return;
            }

            const recommendations = [
                ...new Map(data.recommendations.map(item => [item.Model, item])).values()
            ].slice(0, 4);

            recommendations.forEach(car => {
                const item = document.createElement("div");
                item.classList.add("elements");

                const price = car["Ex-Showroom_Price"]
                    ? Math.round(Number(car["Ex-Showroom_Price"])).toLocaleString("en-IN")
                    : "N/A";

                const mileage = car["ARAI_Certified_Mileage"]
                    ? Number(car["ARAI_Certified_Mileage"]).toFixed(1)
                    : "N/A";

                const reasons = car.match_reasons && car.match_reasons.length > 0
                    ? `<p><strong>Why:</strong> ${car.match_reasons.join(", ")}</p>`
                    : "";

                item.innerHTML = `
                    <img src="${car.carImage || "/static/car_images/pic1.avif"}" 
                         alt="${car.Make || "Car"} ${car.Model || ""}">

                    <div class="t">
                        <h1>${car.Make || "Unknown"} ${car.Model || ""} ${car.Variant || ""}</h1>

                        <div class="p">
                            <p>₹${price}</p>
                            <p>Mileage: ${mileage} kmpl</p>
                            <p>Transmission: ${car.Transmission || "Not specified"}</p>
                            <p>Fuel: ${car.Fuel_Type || "Not specified"}</p>
                            ${reasons}
                        </div>

                        <div class="links">
                            <a href="${car.carDekhoLink || "#"}" target="_blank">CarDekho</a>
                            <a href="${car.carWaleLink || "#"}" target="_blank">CarWale</a>
                        </div>
                    </div>
                `;

                resultBox.appendChild(item);
            });

        } catch (error) {
            console.error("FRONTEND ERROR:", error);
            resultBox.innerHTML = "<p>Frontend error. Open browser console for details.</p>";
        }
    };
</script>
</body>
</html>
